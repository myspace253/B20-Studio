name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      # Dummy values so build-time code paths that read these don't crash.
      # No real database or wallet interaction happens during lint/typecheck/build.
      DATABASE_URL: "postgresql://user:password@localhost:5432/base_studio"
      AUTH_SECRET: "ci-only-placeholder-not-used-for-anything-real"
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: "ci-placeholder"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
